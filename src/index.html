<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 智能单词卡片系统</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="app-container">
    <header class="control-panel">
      <h1><i class="fas fa-book-open"></i> 词汇解析云端</h1>
      <div class="actions">
        <label for="fileInput" class="btn btn-upload">
          <i class="fas fa-cloud-upload-alt"></i> 上传 Word
        </label>
        <input type="file" id="fileInput" accept=".docx" hidden>

        <button id="btnDownload" class="btn btn-download">
          <i class="fas fa-download"></i> 下载数据
        </button>

        <button id="btnDelete" class="btn btn-delete">
          <i class="fas fa-trash-alt"></i> 清空存储
        </button>
      </div>
      <div id="status" class="status-text">待上传文档...</div>
    </header>

    <main class="viewer">
      <div id="cardWrapper" class="card-wrapper hidden">
        <button id="prevBtn" class="nav-btn"><i class="fas fa-chevron-left"></i></button>

        <div class="card" id="wordCard">
          <div class="card-header">
            <span class="word-id" id="wordId">1</span>
            <h2 id="wordText">Word</h2>
            <span class="phonetic" id="phonetic">[/.../]</span>
            <button id="speakBtn" class="audio-btn"><i class="fas fa-volume-up"></i></button>
          </div>

          <div class="card-body">
            <div class="info-section">
              <label>常见词义</label>
              <p id="commonDef">-</p>
            </div>
            <div class="info-section">
              <label>场景记忆</label>
              <p id="sceneMem">-</p>
            </div>
            <div class="info-section">
              <label>句子翻译</label>
              <p id="sentenceTrans" class="italic">-</p>
            </div>
            <div class="info-section">
              <label>词组搭配</label>
              <p id="collocation">-</p>
            </div>
          </div>
        </div>

        <button id="nextBtn" class="nav-btn"><i class="fas fa-chevron-right"></i></button>
      </div>

      <div id="emptyState" class="empty-state">
        <i class="fas fa-file-word"></i>
        <p>请上传您的单词 Word 文档进行解析</p>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>

</html>
