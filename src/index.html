<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Card Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <script src="https://unpkg.com/mammoth@1.7.2/mammoth.browser.min.js"></script>
</head>

<body>
  <section id="authOverlay" class="auth-overlay">
    <div class="auth-card">
      <h2>账号登录</h2>
      <p class="auth-subtitle">注册后即可进入独立学习空间</p>
      <div class="auth-tabs">
        <button id="authLoginTab" class="auth-tab active" type="button">登录</button>
        <button id="authRegisterTab" class="auth-tab" type="button">注册</button>
      </div>
      <form id="loginForm" class="auth-form">
        <label class="auth-label">
          用户名
          <input id="loginUsername" class="auth-input" type="text" autocomplete="username" required />
        </label>
        <label class="auth-label">
          密码
          <input id="loginPassword" class="auth-input" type="password" autocomplete="current-password" required />
        </label>
        <button class="auth-submit" type="submit">登录进入</button>
      </form>
      <form id="registerForm" class="auth-form hidden">
        <label class="auth-label">
          用户名
          <input id="registerUsername" class="auth-input" type="text" autocomplete="username" required />
        </label>
        <label class="auth-label">
          密码
          <input id="registerPassword" class="auth-input" type="password" autocomplete="new-password" required />
        </label>
        <button class="auth-submit" type="submit">注册并登录</button>
      </form>
      <div id="authMessage" class="auth-message"></div>
    </div>
  </section>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-badge">W</div>
        <div>
          <h1>Word Card Studio</h1>
          <p>上传 Word，智能解析单词卡</p>
        </div>
      </div>

      <div class="upload-panel glass">
        <label class="upload-button">
          <input id="fileInput" type="file" accept=".docx,.txt" multiple hidden />
          <span>上传文档</span>
        </label>
      </div>

      <div id="reviewSection" class="sidebar-section collapsible-section">
        <div class="section-title-row">
          <h2>今日应复习</h2>
          <div class="section-tools">
            <span id="todayReviewCount" class="muted-pill">0</span>
            <button id="toggleReviewBtn" class="section-toggle-btn" title="折叠/展开">▾</button>
          </div>
        </div>
        <div id="todayReviewList" class="review-list"></div>
      </div>

      <div id="fileSection" class="sidebar-section collapsible-section">
        <div class="section-title-row">
          <h2>文件列表</h2>
          <div class="section-tools">
            <span id="fileCount" class="muted-pill">0</span>
            <button id="toggleFileBtn" class="section-toggle-btn" title="折叠/展开">▾</button>
          </div>
        </div>
        <div id="fileList" class="file-list"></div>
      </div>

      <div class="sidebar-theme-dock glass">
        <div class="sidebar-theme-label">界面模式</div>
        <div class="theme-toggle sidebar-theme-toggle">
          <button id="themeLightBtn" class="theme-btn active" title="日常模式">日常模式</button>
          <button id="themeDarkBtn" class="theme-btn" title="深色模式">深色模式</button>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <div class="topbar glass">
        <div>
          <h2 id="currentDocTitle">请选择左侧文件并点击“解析”</h2>
          <p id="currentDocMeta">解析后会在这里显示单词卡片，可左右切换、朗读和默写。</p>
          <div id="cloudSyncStatus" class="cloud-sync-status">云端：未连接</div>
          <div id="authSessionBar" class="auth-session-bar hidden">
            <span id="sessionUserText"></span>
            <div id="adminWorkspacePanel" class="admin-workspace-panel hidden">
              <label for="workspaceUserSelect">管理空间</label>
              <select id="workspaceUserSelect"></select>
              <button id="refreshUsersBtn" class="secondary-inline-btn" type="button">刷新用户</button>
            </div>
            <button id="logoutBtn" class="secondary-inline-btn" type="button">退出登录</button>
          </div>
        </div>
        <div class="topbar-actions">
          <div class="action-group">
            <div class="action-group-title">记忆模块</div>
            <div class="action-group-body">
              <button id="modeStudyBtn" class="mode-btn active">学习模式</button>
              <button id="modeChoiceBtn" class="mode-btn">记忆选词</button>
              <button id="modeQuizBtn" class="mode-btn">默写模式</button>
              <button id="modeWrongReviewBtn" class="mode-btn">错词复习</button>
              <button id="wrongManagerBtn" class="secondary-inline-btn">错词管理</button>
              <button id="prevCardBtn" class="icon-btn" title="上一张">←</button>
              <button id="speakBtn" class="icon-btn speak-btn" title="朗读当前单词">🔊</button>
              <button id="nextCardBtn" class="icon-btn" title="下一张">→</button>
            </div>
          </div>

          <div class="action-group">
            <div class="action-group-title">下载模块</div>
            <div class="action-group-body">
              <button id="downloadPdfBtn" class="secondary-inline-btn">下载 PDF</button>
              <button id="downloadWrongBtn" class="secondary-inline-btn">下载错词 PDF</button>
            </div>
          </div>

          <button id="syncCloudBtn" class="secondary-inline-btn">云端同步</button>
        </div>
      </div>

      <section id="adminConsole" class="admin-console glass hidden">
        <div class="admin-console-head">
          <div>
            <h3>用户管理</h3>
            <p>管理员模式：重点管理用户空间、在线状态与文档同步。</p>
          </div>
          <button id="adminConsoleRefreshBtn" class="secondary-inline-btn" type="button">刷新用户状态</button>
        </div>
        <div id="adminUsersList" class="admin-users-list"></div>
      </section>

      <section id="emptyState" class="empty-state glass">
        <div class="empty-orb"></div>
        <h3>把你的单词 Word 文档放进来</h3>
        <p>左侧上传后，可单独解析每个文件。系统会按序号分段，再把每个单词整理成大卡片。并根据文件名中的日期自动给出今日应复习的文件。</p>
      </section>

      <section id="cardsArea" class="cards-area hidden">
        <div class="carousel-wrap">
          <button id="prevOverlayBtn" class="nav-overlay left">❮</button>
          <div id="cardsViewport" class="cards-viewport"></div>
          <button id="nextOverlayBtn" class="nav-overlay right">❯</button>
        </div>

        <div class="footer-strip glass">
          <div id="cardIndex" class="card-index">0 / 0</div>
          <div id="cardMiniMeta" class="card-mini-meta">等待解析</div>
        </div>
      </section>
    </main>
  </div>

  <template id="fileItemTemplate">
    <div class="file-item glass">
      <div class="file-item-main">
        <div class="file-name"></div>
        <div class="file-meta"></div>
      </div>
      <div class="file-actions">
        <button class="parse-btn">解析</button>
        <button class="delete-btn">删除</button>
      </div>
    </div>
  </template>

  <template id="reviewItemTemplate">
    <div class="review-item glass">
      <div class="review-name"></div>
      <div class="review-meta"></div>
      <button class="review-open-btn">打开并解析</button>
    </div>
  </template>

  <template id="cardTemplate">
    <article class="word-card glass">
      <div class="card-top">
        <div class="card-serial"></div>
      </div>
      <div class="headword-row">
        <h3 class="headword"></h3>
        <div class="headword-score hidden"></div>
        <button class="small-speak-btn headword-audio" title="朗读">🔊</button>
      </div>
      <div class="phonetic"></div>
      <div class="pos-row"></div>
      <div class="fields-grid"></div>
    </article>
  </template>

  <template id="quizTemplate">
    <article class="word-card quiz-card glass">
      <div class="card-top">
        <div class="card-serial"></div>
      </div>
      <div class="quiz-head">
        <div class="quiz-badge">默写模式</div>
        <div class="headword-row">
          <h3 class="headword"></h3>
          <div class="headword-score hidden"></div>
          <button class="small-speak-btn headword-audio" title="朗读">🔊</button>
        </div>
        <div class="phonetic"></div>
      </div>
      <div class="quiz-answer hidden">
        <div class="quiz-meaning"></div>
        <div class="quiz-extra"></div>
      </div>
      <div class="quiz-actions-top">
        <button class="reveal-btn">显示释义</button>
      </div>
      <div class="quiz-judge hidden">
        <button class="judge-btn correct">正确</button>
        <button class="judge-btn wrong">错误</button>
      </div>
    </article>
  </template>

  <template id="choiceTemplate">
    <article class="word-card choice-card glass">
      <div class="card-top">
        <div class="card-serial"></div>
      </div>
      <div class="quiz-head">
        <div class="quiz-badge">记忆选词</div>
        <div class="headword-row">
          <h3 class="headword"></h3>
          <button class="small-speak-btn headword-audio" title="朗读">🔊</button>
        </div>
        <div class="phonetic"></div>
      </div>
      <div class="choice-prompt">请选择最符合这个单词的意思：</div>
      <div class="choice-options"></div>
      <div class="choice-feedback hidden"></div>
    </article>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="app.js"></script>
</body>

</html>
