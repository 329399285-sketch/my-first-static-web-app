<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Card Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <script src="https://unpkg.com/mammoth@1.7.2/mammoth.browser.min.js"></script>
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>

  <div class="app-shell">
    <aside class="sidebar panel">
      <div class="brand">
        <div class="brand-badge">W</div>
        <div>
          <h1>Word Card Studio</h1>
          <p>更美观的白色简约版 · 支持深浅色切换</p>
        </div>
      </div>

      <div class="toolbar panel-soft">
        <label class="upload-button">
          <input id="fileInput" type="file" accept=".docx,.txt" multiple hidden />
          <span>上传文档</span>
        </label>
        <button id="downloadDataBtn" class="ghost-button">下载数据</button>
      </div>

      <div class="theme-switch panel-soft">
        <div>
          <strong>界面模式</strong>
          <div class="subtext">支持日常模式 / 深色模式</div>
        </div>
        <button id="themeToggleBtn" class="theme-toggle" aria-label="切换模式">
          <span class="theme-icon">☀️</span>
          <span id="themeToggleText">切换深色</span>
        </button>
      </div>

      <div class="sidebar-section">
        <div class="section-header">
          <h2>文件列表</h2>
          <span id="fileCount" class="counter-pill">0</span>
        </div>
        <div id="fileList" class="file-list"></div>
      </div>

      <div class="tips panel-soft">
        <h3>智能解析说明</h3>
        <p>自动按 <code>1：word</code>、<code>1: word</code>、<code>[1] word</code> 切分词条。</p>
        <p>自动识别 <code>[常见词义]</code>、<code>[重点程度]</code>、<code>[释义]</code> 等字段。</p>
      </div>
    </aside>

    <main class="main-area">
      <header class="topbar panel">
        <div class="topbar-main">
          <h2 id="currentDocTitle">请选择左侧文件并点击“解析”</h2>
          <p id="currentDocMeta">解析后会在中间生成卡片，支持左右切换、发音和更优排版。</p>
        </div>
        <div class="topbar-actions">
          <button id="prevCardBtn" class="icon-btn" title="上一张">←</button>
          <button id="nextCardBtn" class="icon-btn" title="下一张">→</button>
        </div>
      </header>

      <section id="emptyState" class="empty-state panel">
        <div class="sparkles">
          <span></span><span></span><span></span>
        </div>
        <h3>上传后点击左侧“解析”</h3>
        <p>新版界面采用更简约的白色主风格，并支持深色模式切换。重点分数与发音按钮已放到单词旁边。</p>
      </section>

      <section id="cardsArea" class="cards-area hidden">
        <div class="carousel-wrap">
          <button id="prevOverlayBtn" class="nav-btn left">❮</button>
          <div id="cardsViewport" class="cards-viewport"></div>
          <button id="nextOverlayBtn" class="nav-btn right">❯</button>
        </div>
        <div class="status-bar panel-soft">
          <div id="cardIndex">0 / 0</div>
          <div id="cardMiniMeta">等待解析</div>
        </div>
      </section>
    </main>
  </div>

  <template id="fileItemTemplate">
    <div class="file-item panel-soft">
      <div class="file-item-head">
        <div class="file-name"></div>
        <div class="file-meta"></div>
      </div>
      <div class="file-actions">
        <button class="parse-btn">解析</button>
        <button class="delete-btn">删除</button>
      </div>
    </div>
  </template>

  <template id="cardTemplate">
    <article class="word-card panel">
      <div class="card-topline">
        <div class="serial-badge"></div>
        <div class="card-actions-right"></div>
      </div>

      <div class="word-line">
        <h3 class="headword"></h3>
        <div class="headword-tools">
          <div class="score-chip"></div>
          <button class="speak-word-btn" title="朗读单词">🔊</button>
        </div>
      </div>

      <div class="sub-line">
        <div class="phonetic"></div>
        <div class="pos-row"></div>
      </div>

      <div class="meaning-banner"></div>
      <div class="fields-grid"></div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
